<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cafe Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent: #ffc107; /* Насыщенный желтый */
            --text: #ffffff;
            --gray: #888888;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            -webkit-user-select: none;
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        .logo-icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(255, 193, 7, 0.3));
        }

        h1 {
            font-size: 24px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Меню товаров */
        .section-title {
            font-size: 14px;
            color: var(--accent);
            text-transform: uppercase;
            margin: 25px 0 15px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--accent), transparent);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
            border: 1px solid #222;
        }

        .card:active {
            transform: scale(0.95);
        }

        .card i {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 12px;
            display: block;
        }

        .item-name {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .item-price {
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 12px;
        }

        .counter {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #252525;
            border-radius: 12px;
            padding: 5px;
        }

        .btn-math {
            background: var(--accent);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }

        .count-val { font-weight: bold; width: 30px; }

        /* Поля ввода */
        .input-group {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .input-field {
            width: 100%;
            background: #252525;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px;
            color: white;
            margin-top: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        .input-field:focus { border-color: var(--accent); }

        label { font-size: 13px; color: var(--gray); }
    </style>
</head>
<body>

    <header>
        <div class="logo-icon"><i class="fas fa-mug-hot"></i></div>
        <h1>CAFE</h1>
    </header>

    <div class="section-title">Класика</div>

    <div class="grid">
        <div class="card">
            <i class="fas fa-coffee"></i>
            <div class="item-name">Еспресо</div>
            <div class="item-price">45 ₴</div>
            <div class="counter">
                <button class="btn-math" onclick="update('esp', -1)">-</button>
                <span class="count-val" id="esp">0</span>
                <button class="btn-math" onclick="update('esp', 1)">+</button>
            </div>
        </div>

        <div class="card">
            <i class="fas fa-mortar-pestle"></i>
            <div class="item-name">Капучино</div>
            <div class="item-price">65 ₴</div>
            <div class="counter">
                <button class="btn-math" onclick="update('cap', -1)">-</button>
                <span class="count-val" id="cap">0</span>
                <button class="btn-math" onclick="update('cap', 1)">+</button>
            </div>
        </div>

        <div class="card">
            <i class="fas fa-glass-whiskey"></i>
            <div class="item-name">Лате</div>
            <div class="item-price">75 ₴</div>
            <div class="counter">
                <button class="btn-math" onclick="update('lat', -1)">-</button>
                <span class="count-val" id="lat">0</span>
                <button class="btn-math" onclick="update('lat', 1)">+</button>
            </div>
        </div>

        <div class="card">
            <i class="fas fa-cookie"></i>
            <div class="item-name">Cookie</div>
            <div class="item-price">40 ₴</div>
            <div class="counter">
                <button class="btn-math" onclick="update('cook', -1)">-</button>
                <span class="count-val" id="cook">0</span>
                <button class="btn-math" onclick="update('cook', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="input-group">
        <label><i class="fas fa-phone"></i> Ваш номер телефону</label>
        <input type="tel" id="phone" class="input-field" placeholder="+380...">
        
        <label><i class="far fa-clock"></i> На котру годину?</label>
        <input type="time" id="time" class="input-field">
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.textColor = "#000000";
        tg.MainButton.color = "#ffc107";

        let items = {
            'esp': {name: 'Еспресо', price: 45, count: 0},
            'cap': {name: 'Капучино', price: 65, count: 0},
            'lat': {name: 'Лате', price: 75, count: 0},
            'cook': {name: 'Cookie', price: 40, count: 0}
        };

        function update(id, delta) {
            items[id].count += delta;
            if (items[id].count < 0) items[id].count = 0;
            document.getElementById(id).innerText = items[id].count;
            
            let total = 0;
            for (let key in items) total += items[key].count * items[key].price;
            
            if (total > 0) {
                tg.MainButton.text = `ЗАМОВИТИ: ${total} ₴`;
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        Telegram.WebApp.onEvent('mainButtonClicked', function() {
            let phone = document.getElementById('phone').value;
            let time = document.getElementById('time').value;
            
            if(!phone || !time) {
                tg.showAlert("Будь ласка, заповніть час та телефон!");
                return;
            }

            let orderText = "";
            for (let key in items) {
                if(items[key].count > 0) orderText += `${items[key].name} x${items[key].count}; `;
            }

            tg.sendData(JSON.stringify({
                order: orderText,
                phone: phone,
                time: time
            }));
        });
    </script>
</body>
</html>
